services:

  nginx:
    image: nginx:latest

    container_name: absensi_nginx

    ports:
      - "8080:80"

    volumes:
      - ./app:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - php


  php:

    build:

      context: .

      dockerfile: docker/php/Dockerfile


    container_name: absensi_php


    volumes:

      - ./app:/var/www


    depends_on:

      - mysql



  mysql:

    image: mysql:8.0


    container_name: absensi_mysql


    restart: always


    environment:

      MYSQL_DATABASE: absensi

      MYSQL_USER: absensi_user

      MYSQL_PASSWORD: password123

      MYSQL_ROOT_PASSWORD: root123


    ports:

      - "3306:3306"


    volumes:

      - mysql_data:/var/lib/mysql



  phpmyadmin:


    image: phpmyadmin/phpmyadmin


    container_name: absensi_phpmyadmin


    restart: always


    ports:

      - "8081:80"


    environment:

      PMA_HOST: mysql


    depends_on:

      - mysql



volumes:

  mysql_data:
